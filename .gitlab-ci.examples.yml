
test_examples_on_x86_910B4:
  tags:
    - docker_npu # Build and test on-device NPU (x86-64 / 910B4)
  <<: *build_config
  parallel:
    matrix:
      - EXAMPLE: ["scan", "silu_dynamic"]
  script:
    - echo "Testing example ${EXAMPLE}"
    - make setup_once
    - cd cd examples/jit_cpp/${EXAMPLE}
    - python3 run_${EXAMPLE}.py
