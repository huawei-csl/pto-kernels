name: CI

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "0 2 * * *"   # runs every day at 02:00 UTC
  workflow_dispatch:       # allows manual trigger
  pull_request:

jobs:
  build_aicpu_exmple:
    name: Cmake build inside quay.io/ascend/cann (${{ matrix.npu_device }}, py${{ matrix.python_version }})
    runs-on: ubuntu-latest
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            python_version: 3.11
            npu_device: 910b
          - arch: x86_64
            python_version: 3.12
            npu_device: 910b
          - arch: x86_64
            python_version: 3.11
            npu_device: a3
          - arch: x86_64
            python_version: 3.12
            npu_device: a3

    container:
      image: quay.io/ascend/cann:8.5.1-${{ matrix.npu_device }}-ubuntu22.04-py${{ matrix.python_version }}
    steps:
      - name: Show OS
        run: cat /etc/os-release

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run bash commands
        shell: bash
        run: |
          source /usr/local/Ascend/ascend-toolkit/set_env.sh
          source /usr/local/Ascend/nnal/atb/set_env.sh
          apt-get install libc6-dev-i386 # To avoid "/usr/include/x86_64-linux-gnu/gnu/stubs.h:7:11: fatal error: 'gnu/stubs-32.h' file not found"
          cd examples/aicpu
          make build
