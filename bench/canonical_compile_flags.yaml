device:
  soc: ascend910b
  pto_arch: a3
  npu_arch: dav-2201
  toolkit_version: 9.0.0-beta.1
bench:
  warmup: 20
  repeat: 100
  statistic: median
  parity_threshold: 0.10
correctness:
  atol: 1.0e-3
  rtol: 1.0e-3
  shape_sets:
    - smoke
    - nominal
    - boundary
compile:
  ptoas:
    - --pto-arch=a3
    - --enable-insert-sync
  bisheng:
    - -fPIC
    - -shared
    - -D_FORTIFY_SOURCE=2
    - -O2
    - -std=c++17
    - -Wno-macro-redefined
    - -Wno-ignored-attributes
    - -fstack-protector-strong
    - -xcce
    - -Xhost-start
    - -Xhost-end
    - -mllvm
    - -cce-aicore-stack-size=0x8000
    - -mllvm
    - -cce-aicore-function-stack-size=0x8000
    - -mllvm
    - -cce-aicore-record-overflow=true
    - -mllvm
    - -cce-aicore-addr-transform
    - -mllvm
    - -cce-aicore-dcci-insert-for-scalar=false
    - --npu-arch=dav-2201
    - -DMEMORY_BASE
